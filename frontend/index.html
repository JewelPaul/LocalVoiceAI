<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LocalVoiceAI</title>
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body>

  <!-- ── Minimal header: branding + model + status ── -->
  <header class="app-header">
    <span class="logo">LocalVoiceAI</span>
    <div class="header-status">
      <select id="modelSelect" class="model-select">
        <option value="">Loading…</option>
      </select>
      <span id="statusDot" class="status-dot disconnected"></span>
      <span id="statusText" class="status-text">Disconnected</span>
    </div>
    <button id="settingsBtn" class="settings-btn" title="Settings" aria-label="Settings">⚙</button>
  </header>

  <!-- ── Voice stage: waveform + transcript + chat ── -->
  <main class="voice-stage">
    <canvas id="waveformCanvas" class="waveform-canvas"></canvas>
    <div id="voiceState" class="voice-state">Tap microphone to speak</div>
    <div id="liveTranscription" class="live-transcription" aria-live="polite"></div>
    <div id="chatHistory" class="chat-history" aria-live="polite"></div>
    <div class="chat-input-row">
      <input id="chatInput" class="chat-input" type="text"
             placeholder="Or type a message…" autocomplete="off" />
      <button id="sendBtn" class="send-btn" aria-label="Send">&#8593;</button>
    </div>
  </main>

  <!-- ── Bottom bar: tool activity + controls ── -->
  <footer class="bottom-bar">
    <div class="tool-activity-area">
      <div id="currentTool" class="current-tool-inline hidden"></div>
      <div id="toolHistory" class="tool-history-inline"></div>
    </div>
    <div class="control-bar">
      <button id="micBtn" class="mic-btn" title="Toggle recording" aria-label="Toggle recording">
        <span class="mic-icon">&#x1F399;</span>
      </button>
      <div class="control-indicators">
        <span id="connectionDot" class="conn-dot disconnected" title="Connection status"></span>
      </div>
    </div>
  </footer>

  <!-- ── Settings modal: permissions ── -->
  <div id="settingsModal" class="modal-overlay hidden" role="dialog"
       aria-modal="true" aria-label="Settings">
    <div class="modal-box settings-modal">
      <div class="modal-header">
        <h3 class="modal-title">Settings</h3>
        <button id="closeSettings" class="close-btn" aria-label="Close settings">&#x2715;</button>
      </div>
      <div class="settings-section">
        <h4 class="settings-label">Permissions</h4>
        <div id="permissionsList" class="permissions-list">
          <!-- Populated by JS -->
        </div>
      </div>
    </div>
  </div>

  <!-- ── Confirmation modal ── -->
  <div id="confirmModal" class="modal-overlay hidden" role="dialog"
       aria-modal="true" aria-label="Action confirmation">
    <div class="modal-box">
      <h3 class="modal-title">&#x26A0; Action Required</h3>
      <p id="confirmDescription" class="modal-desc"></p>
      <div id="confirmToolDetails" class="modal-tool-details"></div>
      <div class="modal-buttons">
        <button id="confirmAllow"  class="btn btn-allow">Allow Once</button>
        <button id="confirmAlways" class="btn btn-always">Allow Always</button>
        <button id="confirmCancel" class="btn btn-cancel">Cancel</button>
      </div>
    </div>
  </div>

  <script src="/static/js/tools.js"></script>
  <script src="/static/js/voice.js"></script>
  <script src="/static/js/app.js"></script>
</body>
</html>
